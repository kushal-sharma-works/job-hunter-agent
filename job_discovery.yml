name: Job Discovery Agent

on:
  # Run every Monday, Wednesday, and Friday at 07:00 UTC (09:00 Amsterdam)
  schedule:
    - cron: "0 7 * * 1,3,5"

  # Allow manual trigger from the Actions tab (useful for testing)
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r job-discovery-agent/requirements.txt

      # ── 4. Install Playwright browser (Chromium only) ────────────────────────
      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      # ── 5. Restore seen_jobs.json from cache (persists across runs) ──────────
      - name: Restore deduplication state
        uses: actions/cache@v4
        with:
          path: job-discovery-agent/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: seen-jobs-

      # ── 6. Decode Gmail token from secret ────────────────────────────────────
      - name: Decode Gmail token
        run: |
          echo "${{ secrets.GMAIL_TOKEN_B64 }}" | base64 -d > job-discovery-agent/gmail_token.json
        # Will silently skip if secret is empty — Gmail source just warns and continues

      # ── 7. Run the agent ─────────────────────────────────────────────────────
      - name: Run job discovery agent
        working-directory: job-discovery-agent
        env:
          ADZUNA_APP_ID:       ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:      ${{ secrets.ADZUNA_APP_KEY }}
          SERPER_API_KEY:      ${{ secrets.SERPER_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          GITHUB_PAT:          ${{ secrets.CAREER_OPS_PAT }}   # PAT with write access to career-ops repo
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python agent.py

      # ── 8. Save digest + batch as workflow artifacts (downloadable) ──────────
      - name: Upload digest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-digest-${{ github.run_id }}
          path: |
            job-discovery-agent/jobs_*.md
            job-discovery-agent/batch_*.yaml
            job-discovery-agent/run_log_*.json
          retention-days: 30

      # ── 9. Save updated seen_jobs.json back to cache ─────────────────────────
      - name: Save deduplication state
        if: always()
        uses: actions/cache@v4
        with:
          path: job-discovery-agent/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
