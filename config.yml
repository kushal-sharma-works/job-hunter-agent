# config.yml
# All user-facing settings. Secrets go in .env (local) or GitHub Secrets (CI).
# See SETUP.md for the full list of required environment variables.

# ─── Search keywords ──────────────────────────────────────────────────────────

search:
  keywords:
    developer:
      - "Java developer Netherlands"
      - "Kotlin developer Amsterdam"
      - "Spring Boot developer Amsterdam"
      - "backend developer Amsterdam"
      - "full stack developer Netherlands"
      - "software engineer Amsterdam"
      - "backend engineer Netherlands visa"
    pm:
      - "product manager Amsterdam"
      - "associate product manager Netherlands"
      - "product owner Amsterdam tech"
      - "junior product manager Netherlands"

  # Dutch city allow-list — jobs outside these are filtered out
  allowed_locations:
    - Amsterdam
    - Rotterdam
    - Utrecht
    - "Den Haag"
    - "The Hague"
    - Eindhoven
    - Delft
    - Leiden
    - Haarlem
    - Almere

# ─── IND register ─────────────────────────────────────────────────────────────

ind:
  register_page: "https://ind.nl/en/public-register-recognised-sponsors"
  register_url_fallback: "https://ind.nl/en/documents/public-register-regular-labour-and-highly-skilled-migrants.xlsx"
  cache_days: 7
  cache_file: "ind_register_cache.xlsx"
  target_cities:
    - Amsterdam
    - Rotterdam
    - Utrecht
    - "Den Haag"
    - Eindhoven
    - Delft
    - Leiden
    - Haarlem
    - Almere
    - Schiphol
  fuzzy_threshold: 85

# ─── Sources ──────────────────────────────────────────────────────────────────

sources:
  # Adzuna public API (free, 250 req/day) — needs ADZUNA_APP_ID + ADZUNA_APP_KEY
  adzuna:
    enabled: true
    results_per_keyword: 50

  # python-jobspy — scrapes LinkedIn, Indeed, Glassdoor directly. No API key needed.
  jobspy:
    enabled: true
    results_per_keyword: 15

  # IND-registered companies → Greenhouse / Lever / Ashby slug lookup
  greenhouse_ind:
    enabled: true
  lever_ind:
    enabled: true
  ashby_ind:
    enabled: true

  # Wellfound Playwright scraper
  wellfound:
    enabled: true
    url: "https://wellfound.com/role/l/software-engineer/netherlands"

  # Undutchables scraper
  undutchables:
    enabled: true
    url: "https://www.undutchables.nl/vacatures/?function=it-and-telecom"

  # Gmail API — needs gmail_token.json (run gmail_setup.py once)
  gmail_yutori:
    enabled: true
    label: "Yutori Scouts"
  gmail_andrew:
    enabled: true
    sender_contains: "stutanski"

  # Brave Search sources — all need BRAVE_API_KEY
  # Sign up free at: https://brave.com/search/api (2,000 queries/month)
  linkedin_jobs:
    enabled: true
  linkedin_posts:
    enabled: true
  niche_boards:
    enabled: true   # covers tech boards, PM boards, Dutch boards, recruiter sites

# ─── Filtering ────────────────────────────────────────────────────────────────

filters:
  llm_disqualifier: true
  llm_batch_size: 10
  llm_max_desc_chars: 3000

# ─── Enrichment ───────────────────────────────────────────────────────────────

enrichment:
  llm_recruiter_extract: true
  llm_summaries: true

# ─── Outputs ──────────────────────────────────────────────────────────────────

outputs:
  # Push batch TSV to GitHub so career-ops can pick it up
  github_push: true
  batch_dir: "batches"
  career_ops_repo: "kushal-sharma-works/job-hunter-agent"  # ← your repo

# ─── Scoring threshold ────────────────────────────────────────────────────────

career_ops:
  min_score_for_pdf: 4.0