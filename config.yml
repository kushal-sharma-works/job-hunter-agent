# config.yml
# All user-facing settings. Secrets go in .env (local) or GitHub Secrets (CI).
# See SETUP.md for the full list of required environment variables.

# ─── Search keywords ──────────────────────────────────────────────────────────
# NOTE: Adzuna free tier = 250 req/day. With results_per_keyword: 50 (5 pages each),
# keep total keyword count under ~45 to stay safe. Roles section below handles
# matching/scoring — keywords only need to cast the net.

search:
  keywords:
    developer:
      - "Java developer Netherlands"
      - "Kotlin developer Amsterdam"
      - "Spring Boot developer Amsterdam"
      - "backend developer Amsterdam"
      - "full stack developer Netherlands"
      - "software engineer Amsterdam"
      - "backend engineer Netherlands visa"
      - "API developer Netherlands"
      - "API engineer Amsterdam"
      - "integration engineer Netherlands"
      - "Java full stack developer Netherlands"
      - "web application developer Netherlands"

    devops_cloud:
      - "DevOps engineer Netherlands"
      - "cloud engineer Amsterdam"
      - "Azure engineer Netherlands"
      - "platform engineer Amsterdam"
      - "site reliability engineer Netherlands"
      - "infrastructure engineer Netherlands"
      - "CI/CD engineer Netherlands"

    security:
      - "application security engineer Netherlands"
      - "AppSec engineer Amsterdam"
      - "cloud security engineer Netherlands"
      - "DevSecOps engineer Amsterdam"

    observability_performance:
      - "observability engineer Netherlands"
      - "performance engineer Amsterdam"
      - "monitoring engineer Netherlands"

    streaming:
      - "Kafka engineer Netherlands"
      - "event streaming engineer Amsterdam"
      - "event driven architecture engineer Netherlands"

    qa:
      - "QA engineer Amsterdam"
      - "test automation engineer Netherlands"
      - "SDET Netherlands"

    consulting:
      - "IT consultant Amsterdam"
      - "technical consultant Netherlands"

    leadership:
      - "tech lead Amsterdam"
      - "lead software engineer Netherlands"
      - "engineering manager Netherlands"

    architecture:
      - "software architect Amsterdam"
      - "solutions architect Netherlands"

    pm:
      - "product manager Amsterdam"
      - "associate product manager Netherlands"
      - "product owner Amsterdam tech"
      - "junior product manager Netherlands"
      - "technical product manager Amsterdam"

  # Dutch city allow-list — jobs outside these are filtered out
  allowed_locations:
    - Amsterdam
    - Rotterdam
    - Utrecht
    - "Den Haag"
    - "The Hague"
    - Eindhoven
    - Delft
    - Leiden
    - Haarlem
    - Almere

