# ─── IND register ─────────────────────────────────────────────────────────────

ind:
  register_page: "https://ind.nl/en/public-register-recognised-sponsors"
  register_url_fallback: "https://ind.nl/en/documents/06/2023/public-register-regular-labour-and-highly-skilled-migrants.xlsx"
  cache_days: 7
  cache_file: "ind_register_cache.xlsx"
  target_cities:
    - Amsterdam
    - Rotterdam
    - Utrecht
    - "Den Haag"
    - Eindhoven
    - Delft
    - Leiden
    - Haarlem
    - Almere
    - Schiphol
  fuzzy_threshold: 85

# ─── Sources ──────────────────────────────────────────────────────────────────

sources:
  # Adzuna public API (free, 250 req/day) — needs ADZUNA_APP_ID + ADZUNA_APP_KEY
  adzuna:
    enabled: true
    results_per_keyword: 50

  # python-jobspy — scrapes LinkedIn, Indeed, Glassdoor directly. No API key needed.
  jobspy:
    enabled: true
    results_per_keyword: 15

  # IND-registered companies → Greenhouse / Lever / Ashby slug lookup
  greenhouse_ind:
    enabled: true
  lever_ind:
    enabled: true
  ashby_ind:
    enabled: true

  # Wellfound Playwright scraper
  wellfound:
    enabled: true
    url: "https://wellfound.com/role/l/software-engineer/netherlands"

  # Undutchables scraper
  undutchables:
    enabled: true
    url: "https://www.undutchables.nl/vacatures/it-ict/"

  # Gmail API — needs gmail_token.json (run gmail_setup.py once)
  gmail_yutori:
    enabled: true
    label: "Yutori Scouts"
  gmail_andrew:
    enabled: true
    sender_contains: "andrew stetsenko"

  # Brave Search sources — all need BRAVE_API_KEY
  # Sign up free at: https://brave.com/search/api (2,000 queries/month)
  linkedin_jobs:
    enabled: true
  linkedin_posts:
    enabled: true
  niche_boards:
    enabled: true   # covers tech boards, PM boards, Dutch boards, recruiter sites

  # Portals — curated companies from portals.yml (Greenhouse/Lever/Ashby)
  portals:
    enabled: true

# ─── Filtering ────────────────────────────────────────────────────────────────

filters:
  llm_disqualifier: true
  llm_batch_size: 10
  llm_max_desc_chars: 3000
  max_age_days: 21

# ─── Enrichment ───────────────────────────────────────────────────────────────

enrichment:
  llm_recruiter_extract: true
  llm_summaries: true

# ─── Outputs ──────────────────────────────────────────────────────────────────

outputs:
  # Push batch TSV to GitHub so career-ops can pick it up
  github_push: true
  batch_dir: "batches"
  career_ops_repo: "kushal-sharma-works/job-hunter-agent"

# ─── CV Match Scorer ─────────────────────────────────────────────────────────
# Uses OpenAI gpt-4o-mini to score each job against your cv.md (1.0-5.0).
# Jobs below min_score are filtered out before the TSV is written.
# Requires cv.md in the repo root and OPENAI_API_KEY in secrets.

scorer:
  enabled: true
  min_score: 3.5        # jobs below this are dropped
  batch_size: 5         # jobs per OpenAI call (saves tokens)
  max_desc_chars: 3000  # max JD chars sent to scorer

# ─── Scoring threshold ────────────────────────────────────────────────────────

career_ops:
  min_score_for_pdf: 4.0