# portals.yml — Career Ops portal scanner config
# Candidate: Kushal Sharma — Java/Kotlin/React/Spring Boot + PM track
# Target: Randstad (Amsterdam/Rotterdam/Utrecht/Den Haag) | Kennismigrant sponsorship
#
# Track 2 of 2: run /career-ops scan weekly to hit company career pages directly.
# Track 1 (automated): job-hunter-agent runs every 2-3 days via GitHub Actions.
#
# ATS key:
#   Greenhouse  → api: https://boards-api.greenhouse.io/v1/boards/{slug}/jobs
#   Lever       → careers_url: https://jobs.lever.co/{slug}
#   Ashby       → careers_url: https://jobs.ashbyhq.com/{slug}
#   Recruitee   → careers_url: https://{slug}.recruitee.com
#   Other/own   → playwright scrape (default, no special fields needed)
#
# To add a company: copy any entry below, update name + careers_url.
# To pause a company: set enabled: false.

# -- Title filter ---------------------------------------------------------
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # Engineering roles
    - "Software Engineer"
    - "Backend Engineer"
    - "Backend Developer"
    - "Full Stack"
    - "Fullstack"
    - "Platform Engineer"
    - "Staff Engineer"
    - "Senior Engineer"
    - "API Engineer"
    - "SRE"
    - "DevOps"
    - "Cloud Engineer"
    - "Data Engineer"
    # Language/stack signals
    - "Java"
    - "Kotlin"
    - "Python"
    - "TypeScript"
    - "React"
    - "Spring Boot"
    # PM roles
    - "Product Manager"
    - "Product Owner"
    - "Associate Product Manager"
    - "Technical Product Manager"
    # AI/ML roles
    - "ML Engineer"
    - "AI Engineer"
    - "Machine Learning"
    - "LLMOps"
    - "MLOps"

  negative:
    - "Junior"
    - "Intern"
    - "Internship"
    - "Trainee"
    - "Graduate"       # remove this if you want APM/grad PM roles — some are fine
    - "PHP"
    - "Blockchain"
    - "Dutch speaking"
    - "Dutch required"
    - "Dutch proficient"
    - "Dutch language"
    - "Sales"
    - "Marketing"
    - "Office Manager"
    - "HR"
    - "Recruiter"
    - "Customer Support"
    - "Customer Success"

# -- Location filter -------------------------------------------------------
# Empty location on a job always passes (no data = no penalty).

location_filter:
  always_allow:
    - "Amsterdam"
    - "Rotterdam"
    - "Utrecht"
    - "Netherlands"
    - "Remote"
  allow:
    - "Amsterdam"
    - "Rotterdam"
    - "Utrecht"
    - "Den Haag"
    - "The Hague"
    - "Eindhoven"
    - "Delft"
    - "Leiden"
    - "Haarlem"
    - "Almere"
    - "Schiphol"
    - "Netherlands"
    - "Nederland"
    - "Remote"
  block:
    - "India"
    - "Bengaluru"
    - "United Kingdom"
    - "London"
    - "Germany"
    - "France"
    - "Singapore"
    - "Australia"
    - "Canada"
    - "United States"
    - "Dublin"
    - "Warsaw"
    - "Krakow"

