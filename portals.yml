# -- Broad discovery (VC portfolio boards + ATS sweeps) ---------------------

search_queries:

  # VC portfolio boards — catch NL startups not individually tracked
  - name: Alkeon Capital — Netherlands
    query: 'site:jobs.alkeon.com "Netherlands" OR "Amsterdam" engineer OR "product manager"'
    enabled: true

  - name: Khosla Ventures — Netherlands
    query: 'site:jobs.khoslaventures.com "Netherlands" OR "Amsterdam"'
    enabled: true

  - name: Peak Capital — Netherlands
    query: 'site:jobs.peak.capital "Netherlands" OR "Amsterdam" engineer OR "product manager" OR "software"'
    enabled: true

  - name: B2Venture — Netherlands
    query: 'site:jobs.b2venture.vc "Netherlands" OR "Amsterdam" engineer OR "product"'
    enabled: true

  - name: firstminute capital — Netherlands
    query: 'site:jobs.firstminute.capital "Netherlands" OR "Amsterdam" engineer OR "product"'
    enabled: true

  - name: Sapphire Ventures — Netherlands
    query: 'site:jobs.sapphireventures.com "Netherlands" OR "Amsterdam" engineer OR "product"'
    enabled: true

  - name: Graduate.nl — Netherlands tech
    query: 'site:jobs.graduate.nl "Netherlands" engineer OR "product manager" OR "software"'
    enabled: true

  - name: Weekday Works — Netherlands visa
    query: 'site:jobs.weekday.works "Netherlands" "visa" OR "kennismigrant" OR "sponsorship"'
    enabled: true

  # Broad ATS sweeps with visa/sponsorship signal
  - name: Greenhouse — NL visa sponsorship engineers
    query: 'site:boards.greenhouse.io "Netherlands" "visa sponsorship" "Software Engineer" OR "Product Manager" OR "Backend"'
    enabled: true

  - name: Greenhouse job-boards — NL visa engineers
    query: 'site:job-boards.greenhouse.io "Netherlands" "visa sponsorship" "engineer" OR "developer" OR "backend"'
    enabled: true

  - name: Ashby — NL visa engineers
    query: 'site:jobs.ashbyhq.com "Netherlands" "visa" OR "kennismigrant" "engineer" OR "product manager"'
    enabled: true

  - name: Lever — NL engineers
    query: 'site:jobs.lever.co "Amsterdam" OR "Rotterdam" OR "Utrecht" "visa sponsorship" OR "relocation" engineer OR "product manager"'
    enabled: true
