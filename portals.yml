# portals.yml
# Static list of company career pages + known ATS slugs.
# The agent queries each of these directly — no scraping needed for Greenhouse/Lever/Ashby.
#
# Format:
#   - name: Company Name
#     type: greenhouse | lever | ashby | careers_page | ats_unknown
#     slug: <slug for ATS API>    (for greenhouse/lever/ashby)
#     url:  <direct URL>          (for careers_page)
#
# To find a company's Greenhouse slug: check their jobs page URL for boards.greenhouse.io/<slug>
# To find a Lever slug: check for jobs.lever.co/<slug>
# To find an Ashby slug: check for jobs.ashbyhq.com/<slug>

portals:
